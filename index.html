<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Playtest Scheduler for Stars Reach</title>
    <script src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #080918;
        --bg-alt: #130e22;
        --panel: rgba(13, 14, 32, 0.86);
        --panel-strong: rgba(18, 16, 38, 0.93);
        --border: rgba(214, 150, 101, 0.24);
        --border-cool: rgba(92, 196, 214, 0.22);
        --text: #f7f0ff;
        --muted: #bbaecd;
        --accent: #63d8d9;
        --accent-strong: #249ab0;
        --accent-soft: rgba(99, 216, 217, 0.16);
        --accent-secondary: #b96097;
        --accent-secondary-soft: rgba(185, 96, 151, 0.18);
        --highlight: #d69665;
        --highlight-soft: rgba(214, 150, 101, 0.16);
        --warning: #e3a16c;
        --shadow: 0 24px 58px rgba(2, 3, 12, 0.46);
        --radius: 22px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        -webkit-text-size-adjust: 100%;
      }

      body {
        position: relative;
        overflow-x: hidden;
        font-family: "Chakra Petch", sans-serif;
        color: var(--text);
        background: linear-gradient(180deg, #080918 0%, #141025 100%);
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
      }

      body::before {
        z-index: -2;
        background:
          linear-gradient(180deg, rgba(5, 7, 18, 0.42), rgba(8, 8, 18, 0.7)),
          url("./assets/victorian-celestial-wallpaper.webp") center top / cover no-repeat;
      }

      body::after {
        z-index: -1;
        background:
          radial-gradient(circle at 14% 12%, rgba(99, 216, 217, 0.14), transparent 28%),
          radial-gradient(circle at 84% 16%, rgba(214, 150, 101, 0.13), transparent 24%),
          radial-gradient(circle at 56% 34%, rgba(185, 96, 151, 0.16), transparent 26%),
          linear-gradient(180deg, rgba(7, 9, 21, 0.1), rgba(7, 9, 21, 0.34));
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      button {
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }

      .page-shell {
        position: relative;
        z-index: 1;
        width: min(1280px, calc(100% - 2rem));
        margin: 0 auto;
        padding: 2rem 0 3rem;
      }

      .hero {
        margin-bottom: 1.5rem;
      }

      .eyebrow {
        margin: 0 0 0.5rem;
        color: var(--accent);
        font-size: 0.9rem;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .hero-title {
        margin: 0;
        font-size: clamp(2.4rem, 6vw, 4.6rem);
        line-height: 0.95;
        text-shadow:
          0 0 26px rgba(99, 216, 217, 0.14),
          0 4px 28px rgba(185, 96, 151, 0.12);
      }

      .hero-copy {
        max-width: 760px;
        margin: 1rem 0 0;
        color: var(--muted);
        font-size: 1.08rem;
        line-height: 1.5;
        text-wrap: balance;
      }

      .timezone-banner {
        display: grid;
        gap: 0.35rem;
        margin-top: 1.25rem;
        padding: 1rem 1.1rem;
        border: 1px solid var(--border-cool);
        border-radius: 18px;
        background: linear-gradient(135deg, rgba(14, 15, 36, 0.72), rgba(17, 14, 35, 0.56));
        box-shadow: var(--shadow);
      }

      .timezone-banner-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        flex-wrap: wrap;
      }

      .timezone-banner strong {
        display: block;
        font-size: 1rem;
      }

      .timesource-toggle {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 0.7rem;
        margin-left: auto;
        color: var(--text);
        font-weight: 600;
      }

      .timesource-toggle input {
        width: 1.05rem;
        height: 1.05rem;
        min-height: 0;
        margin: 0;
        accent-color: var(--accent);
      }

      .timesource-toggle span {
        color: var(--text);
        line-height: 1.35;
      }

      .timezone-banner span {
        color: var(--muted);
        line-height: 1.45;
      }

      .layout {
        display: grid;
        gap: 1.25rem;
      }

      .layout.two-col {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .card {
        padding: 1.35rem;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--panel);
        box-shadow: var(--shadow);
        backdrop-filter: blur(14px);
        box-shadow:
          var(--shadow),
          inset 0 1px 0 rgba(247, 240, 255, 0.03);
      }

      .card + .card,
      .layout + .card,
      .card + .layout,
      .layout + .layout {
        margin-top: 1.25rem;
      }

      .card-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: 1rem;
      }

      .card-title {
        margin: 0.15rem 0 0;
        font-size: 1.45rem;
        line-height: 1.05;
      }

      .section-copy {
        margin: 0.4rem 0 0;
        color: var(--muted);
        line-height: 1.45;
      }

      .summary-grid,
      .field-grid,
      .team-grid,
      .timestamp-list {
        display: grid;
        gap: 0.9rem;
      }

      .summary-grid {
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      }

      .field-grid {
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      }

      .team-grid {
        grid-template-columns: repeat(auto-fit, minmax(135px, 1fr));
      }

      .field-span-2 {
        grid-column: span 2;
      }

      .stat {
        display: grid;
        gap: 0.35rem;
        padding: 0.95rem 1rem;
        border: 1px solid rgba(214, 150, 101, 0.12);
        border-radius: 18px;
        background: var(--panel-strong);
      }

      .stat span {
        color: var(--muted);
        font-size: 0.92rem;
      }

      .stat strong {
        font-size: 1rem;
        line-height: 1.4;
      }

      .stat small,
      .helper-text {
        color: var(--muted);
        line-height: 1.45;
      }

      .field {
        display: grid;
        gap: 0.45rem;
      }

      .field label {
        font-size: 0.95rem;
        font-weight: 600;
      }

      input,
      textarea {
        width: 100%;
        min-height: 3rem;
        padding: 0.82rem 0.9rem;
        border: 1px solid rgba(214, 150, 101, 0.16);
        border-radius: 16px;
        color: var(--text);
        background: rgba(10, 10, 24, 0.86);
        font-size: 16px;
        outline: none;
        transition: border-color 0.15s ease, box-shadow 0.15s ease, transform 0.15s ease;
      }

      input:focus,
      textarea:focus {
        border-color: rgba(99, 216, 217, 0.72);
        box-shadow:
          0 0 0 3px rgba(99, 216, 217, 0.14),
          0 0 0 1px rgba(214, 150, 101, 0.18);
      }

      input:disabled {
        opacity: 0.58;
        cursor: not-allowed;
      }

      textarea {
        min-height: 24rem;
        resize: vertical;
        font-family: "IBM Plex Mono", monospace;
        font-size: 0.94rem;
        line-height: 1.5;
      }

      .compact-output {
        min-height: 12rem;
      }

      .button-row,
      .status-row,
      .toggle-row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.7rem;
      }

      .primary-btn,
      .ghost-btn,
      .team-chip,
      .toggle-chip,
      .timestamp-button {
        border: 1px solid transparent;
        border-radius: 16px;
        transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease;
      }

      .primary-btn,
      .ghost-btn,
      .toggle-chip {
        padding: 0.78rem 1rem;
        min-height: 3rem;
      }

      .primary-btn {
        color: #110d1c;
        background: linear-gradient(135deg, var(--accent) 0%, var(--highlight) 100%);
        font-weight: 700;
        box-shadow: 0 14px 28px rgba(36, 154, 176, 0.18);
      }

      .ghost-btn,
      .toggle-chip,
      .team-chip,
      .timestamp-button {
        color: var(--text);
        background: rgba(16, 14, 34, 0.74);
        border-color: rgba(214, 150, 101, 0.16);
      }

      .primary-btn:hover,
      .ghost-btn:hover,
      .team-chip:hover,
      .toggle-chip:hover,
      .timestamp-button:hover {
        transform: translateY(-1px);
        border-color: rgba(99, 216, 217, 0.45);
      }

      .ghost-btn:disabled,
      .timestamp-button:disabled {
        opacity: 0.48;
        cursor: not-allowed;
        transform: none;
      }

      .toggle-chip.active,
      .team-chip.selected {
        border-color: rgba(214, 150, 101, 0.46);
        background: linear-gradient(135deg, rgba(185, 96, 151, 0.28), rgba(99, 216, 217, 0.2));
      }

      .team-chip {
        width: 100%;
        padding: 0.86rem 0.9rem;
        text-align: left;
      }

      .status-pill {
        padding: 0.45rem 0.72rem;
        border: 1px solid rgba(214, 150, 101, 0.18);
        border-radius: 999px;
        color: var(--muted);
        background: rgba(18, 15, 34, 0.64);
        font-size: 0.92rem;
      }

      .timestamp-button {
        display: flex;
        align-items: center;
        justify-content: center;
        min-width: 92px;
        min-height: 3rem;
        padding: 0.72rem 0.9rem;
        text-align: center;
      }

      .timestamp-label {
        font-weight: 700;
      }

      .timestamp-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 0.8rem;
        align-items: center;
        padding: 0.95rem 1rem;
        border: 1px solid rgba(214, 150, 101, 0.14);
        border-radius: 18px;
        background: rgba(17, 14, 35, 0.72);
      }

      .timestamp-content {
        display: grid;
        gap: 0.55rem;
        min-width: 0;
      }

      .timestamp-preview-row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        align-items: flex-start;
      }

      .timestamp-code {
        display: inline-block;
        padding: 0.35rem 0.55rem;
        border-radius: 10px;
        color: var(--accent);
        background: rgba(10, 10, 24, 0.92);
      }

      .timestamp-preview {
        font-size: 1.02rem;
        font-weight: 600;
        line-height: 1.35;
      }

      code,
      .mono {
        font-family: "IBM Plex Mono", monospace;
        word-break: break-word;
      }

      .timestamp-button code {
        color: var(--accent);
      }

      .error-banner {
        margin-top: 1rem;
        padding: 0.85rem 1rem;
        border: 1px solid rgba(214, 150, 101, 0.28);
        border-radius: 16px;
        background: rgba(214, 150, 101, 0.1);
        color: #ffd8b5;
      }

      .toast {
        position: sticky;
        top: 1rem;
        z-index: 20;
        width: fit-content;
        margin-left: auto;
        margin-bottom: 1rem;
        padding: 0.75rem 1rem;
        border: 1px solid rgba(99, 216, 217, 0.28);
        border-radius: 14px;
        background: rgba(18, 15, 36, 0.94);
        color: var(--text);
        box-shadow: var(--shadow);
      }

      .meta-copy {
        color: var(--muted);
        line-height: 1.45;
      }

      @media (max-width: 980px) {
        .layout.two-col {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 720px) {
        .page-shell {
          width: min(1280px, calc(100% - 1rem));
          padding-top: 1.2rem;
        }

        .card {
          padding: 1rem;
        }

        .field-span-2 {
          grid-column: span 1;
        }

        .card-header {
          flex-direction: column;
        }
      }

      @media (max-width: 540px) {
        .page-shell {
          width: calc(100% - 0.75rem);
          padding-top: 0.9rem;
          padding-bottom: calc(2.4rem + env(safe-area-inset-bottom, 0px));
        }

        .hero {
          margin-bottom: 1.1rem;
        }

        .hero-title {
          font-size: clamp(2.1rem, 11vw, 3rem);
          line-height: 0.92;
        }

        .hero-copy,
        .section-copy,
        .meta-copy,
        .timezone-banner span,
        .helper-text,
        .stat small {
          font-size: 0.96rem;
        }

        .timezone-banner,
        .card,
        .timestamp-row,
        .stat {
          border-radius: 20px;
        }

        .timezone-banner-header {
          align-items: flex-start;
        }

        .timesource-toggle {
          width: 100%;
          justify-content: flex-start;
          margin-left: 0;
        }

        .button-row,
        .status-row {
          flex-direction: column;
          align-items: stretch;
        }

        .button-row > *,
        .status-row > *,
        .card-header > .primary-btn,
        .card-header > .ghost-btn {
          width: 100%;
        }

        .timestamp-row {
          grid-template-columns: 1fr;
        }

        .timestamp-preview-row {
          display: grid;
          gap: 0.55rem;
        }

        .timestamp-button {
          width: 100%;
          min-width: 0;
        }

        .timestamp-code {
          max-width: 100%;
        }

        textarea {
          min-height: 18rem;
          font-size: 1rem;
        }

        .compact-output {
          min-height: 10rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useEffect, useState } = React;

      const TEAM_OPTIONS = [
        { letter: "α", name: "Alpha" },
        { letter: "β", name: "Beta" },
        { letter: "γ", name: "Gamma" },
        { letter: "δ", name: "Delta" },
        { letter: "ε", name: "Epsilon" },
        { letter: "ζ", name: "Zeta" },
        { letter: "η", name: "Eta" },
        { letter: "θ", name: "Theta" },
        { letter: "ι", name: "Iota" },
        { letter: "κ", name: "Kappa" },
        { letter: "λ", name: "Lambda" },
        { letter: "μ", name: "Mu" },
        { letter: "ν", name: "Nu" },
        { letter: "ξ", name: "Xi" },
        { letter: "ο", name: "Omicron" },
        { letter: "π", name: "Pi" },
        { letter: "ρ", name: "Rho" },
        { letter: "σ", name: "Sigma" },
        { letter: "τ", name: "Tau" },
      ];

      const TIMESTAMP_FORMATS = [
        { style: "F", label: "Long Date/Time" },
        { style: "f", label: "Short Date/Time" },
        { style: "D", label: "Long Date" },
        { style: "d", label: "Short Date" },
        { style: "t", label: "Short Time" },
        { style: "T", label: "Long Time" },
        { style: "R", label: "Relative Time" },
        { style: "s", label: "Short Date + Time" },
        { style: "S", label: "Short Date + Long Time" },
      ];

      const DEFAULT_VOICE_LINK = "https://discord.com/channels/882005173394890802/1328814503705448500";
      const PLACEHOLDER_PATCH_LINK = "PATCH_NOTES_URL";
      const PLACEHOLDER_PATCH_TITLE = "Patch Notes";
      const PACIFIC_TIME_ZONE = "America/Los_Angeles";

      function getIndefiniteArticle(text) {
        if (!text || !text.trim()) return "A";

        const match = text.trim().match(/[A-Za-z0-9]+(?:['-][A-Za-z0-9]+)*/);
        if (!match) return "A";

        const firstWord = match[0];
        const lowerWord = firstWord.toLowerCase();

        if (/^(honest|honor|hour|heir|herb)\b/.test(lowerWord)) {
          return "An";
        }

        if (/^(one|once|ewe|euro|user|ubiq|uni([^a-z]|[b-df-hj-np-tv-z]))/.test(lowerWord)) {
          return "A";
        }

        if (/^[FHLMNRSX]$/.test(firstWord) || /^[FHLMNRSX][A-Z0-9-]+$/.test(firstWord)) {
          return "An";
        }

        return "aeiou".includes(lowerWord.charAt(0)) ? "An" : "A";
      }

      function formatDateTimeLocal(date) {
        const pad = (value) => String(value).padStart(2, "0");
        return [
          date.getFullYear(),
          pad(date.getMonth() + 1),
          pad(date.getDate()),
        ].join("-") + `T${pad(date.getHours())}:${pad(date.getMinutes())}`;
      }

      function parseDateTimeParts(value) {
        if (!value) return null;

        const [datePart, timePart] = value.split("T");
        if (!datePart || !timePart) return null;

        const [year, month, day] = datePart.split("-").map(Number);
        const [hour, minute] = timePart.split(":").map(Number);
        const values = [year, month, day, hour, minute];
        if (values.some((item) => Number.isNaN(item))) return null;

        return { year, month, day, hour, minute };
      }

      function getDatePartsFromDate(date) {
        if (!date) return null;

        return {
          year: date.getFullYear(),
          month: date.getMonth() + 1,
          day: date.getDate(),
          hour: date.getHours(),
          minute: date.getMinutes(),
        };
      }

      function createLocalDateFromParts(parts) {
        if (!parts) return null;
        const parsed = new Date(parts.year, parts.month - 1, parts.day, parts.hour, parts.minute, 0, 0);

        if (Number.isNaN(parsed.getTime())) return null;
        return parsed;
      }

      function getFormatterPartMap(parts) {
        return parts.reduce((map, part) => {
          if (part.type !== "literal") {
            map[part.type] = part.value;
          }

          return map;
        }, {});
      }

      function getTimeZoneDateParts(date, timeZone) {
        const formatter = new Intl.DateTimeFormat("en-US", {
          timeZone,
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          hourCycle: "h23",
        });
        const parts = getFormatterPartMap(formatter.formatToParts(date));

        return {
          year: Number(parts.year),
          month: Number(parts.month),
          day: Number(parts.day),
          hour: Number(parts.hour),
          minute: Number(parts.minute),
          second: Number(parts.second),
        };
      }

      function getTimeZoneOffsetMinutes(date, timeZone) {
        if (!date) return null;
        if (!timeZone) return -date.getTimezoneOffset();

        const parts = getTimeZoneDateParts(date, timeZone);
        const utcFromParts = Date.UTC(
          parts.year,
          parts.month - 1,
          parts.day,
          parts.hour,
          parts.minute,
          parts.second,
          0
        );

        return Math.round((utcFromParts - date.getTime()) / 60000);
      }

      function createDateInTimeZone(parts, timeZone) {
        if (!parts) return null;

        const utcBase = Date.UTC(parts.year, parts.month - 1, parts.day, parts.hour, parts.minute, 0, 0);
        let candidate = new Date(utcBase);

        for (let index = 0; index < 4; index += 1) {
          const offsetMinutes = getTimeZoneOffsetMinutes(candidate, timeZone);
          const adjustedTime = utcBase - offsetMinutes * 60 * 1000;

          if (adjustedTime === candidate.getTime()) {
            break;
          }

          candidate = new Date(adjustedTime);
        }

        return Number.isNaN(candidate.getTime()) ? null : candidate;
      }

      function getWallClockDateInTimeZone(date, timeZone) {
        if (!timeZone) return new Date(date);

        const parts = getTimeZoneDateParts(date, timeZone);
        return new Date(parts.year, parts.month - 1, parts.day, parts.hour, parts.minute, parts.second, 0);
      }

      function parseDateTimeValue(value, timeZone) {
        const parts = parseDateTimeParts(value);
        if (!parts) return null;

        return timeZone ? createDateInTimeZone(parts, timeZone) : createLocalDateFromParts(parts);
      }

      function formatUtcOffset(totalMinutes) {
        const sign = totalMinutes >= 0 ? "+" : "-";
        const absolute = Math.abs(totalMinutes);
        const hours = String(Math.floor(absolute / 60)).padStart(2, "0");
        const minutes = String(absolute % 60).padStart(2, "0");
        return `UTC${sign}${hours}:${minutes}`;
      }

      function getTimeZoneInfo(timeZone, label) {
        const now = new Date();
        const januaryOffset = getTimeZoneOffsetMinutes(new Date(now.getFullYear(), 0, 1), timeZone);
        const julyOffset = getTimeZoneOffsetMinutes(new Date(now.getFullYear(), 6, 1), timeZone);
        const currentOffset = getTimeZoneOffsetMinutes(now, timeZone);
        const observesDST = januaryOffset !== julyOffset;
        const isDSTNow = observesDST && currentOffset === Math.max(januaryOffset, julyOffset);

        return {
          timeZone: label || timeZone || "Local browser time",
          currentOffset,
          observesDST,
          isDSTNow,
        };
      }

      function formatDatePreview(date, timeZone) {
        if (!date) return "Choose a date and time";

        const options = {
          weekday: "short",
          month: "short",
          day: "numeric",
          year: "numeric",
          hour: "numeric",
          minute: "2-digit",
          timeZoneName: "short",
        };

        if (timeZone) {
          options.timeZone = timeZone;
        }

        return new Intl.DateTimeFormat(undefined, options).format(date);
      }

      function getUnixSeconds(date) {
        if (!date || Number.isNaN(date.getTime())) return null;
        return Math.floor(date.getTime() / 1000);
      }

      function getDiscordTimestamp(unixSeconds, style) {
        if (unixSeconds === null) return "";
        return `<t:${unixSeconds}:${style}>`;
      }

      function getRelativeTimePreview(date, nowMs) {
        if (!date) return "";

        const diffSeconds = Math.round((date.getTime() - nowMs) / 1000);
        if (diffSeconds === 0) {
          return "0 seconds ago";
        }

        const units = [
          { unit: "year", seconds: 365 * 24 * 60 * 60 },
          { unit: "month", seconds: 30 * 24 * 60 * 60 },
          { unit: "week", seconds: 7 * 24 * 60 * 60 },
          { unit: "day", seconds: 24 * 60 * 60 },
          { unit: "hour", seconds: 60 * 60 },
          { unit: "minute", seconds: 60 },
          { unit: "second", seconds: 1 },
        ];

        const absolute = Math.abs(diffSeconds);
        const match = units.find((item) => absolute >= item.seconds) || units[units.length - 1];
        const value = Math.round(diffSeconds / match.seconds);

        return new Intl.RelativeTimeFormat(undefined, {
          numeric: "always",
        }).format(value, match.unit);
      }

      function getTimestampPreview(date, style, nowMs, timeZone) {
        if (!date) return "";

        const formatOptions = (options) => new Intl.DateTimeFormat(
          undefined,
          timeZone ? { ...options, timeZone } : options
        ).format(date);

        switch (style) {
          case "t":
            return formatOptions({ timeStyle: "short" });
          case "T":
            return formatOptions({ timeStyle: "medium" });
          case "d":
            return formatOptions({ dateStyle: "short" });
          case "D":
            return formatOptions({ dateStyle: "long" });
          case "f":
            return formatOptions({
              dateStyle: "long",
              timeStyle: "short",
            });
          case "F":
            return formatOptions({
              dateStyle: "full",
              timeStyle: "short",
            });
          case "R":
            return getRelativeTimePreview(date, nowMs);
          case "s":
            return formatOptions({
              dateStyle: "short",
              timeStyle: "short",
            });
          case "S":
            return formatOptions({
              dateStyle: "short",
              timeStyle: "medium",
            });
          default:
            return "";
        }
      }

      function formatDateTimeForTimeSource(date, timeZone) {
        if (!date) return "";
        return formatDateTimeLocal(timeZone ? getWallClockDateInTimeZone(date, timeZone) : date);
      }

      function getDefaultScheduleWindow(timeZone) {
        const pacificNow = getWallClockDateInTimeZone(new Date(), PACIFIC_TIME_ZONE);
        const startPacificWallClock = new Date(
          pacificNow.getFullYear(),
          pacificNow.getMonth(),
          pacificNow.getDate(),
          9,
          0,
          0,
          0
        );
        const daysUntilTuesday = ((2 - startPacificWallClock.getDay() + 7) % 7) || 7;
        const endPacificWallClock = new Date(
          startPacificWallClock.getFullYear(),
          startPacificWallClock.getMonth(),
          startPacificWallClock.getDate() + daysUntilTuesday,
          8,
          0,
          0,
          0
        );
        const start = createDateInTimeZone(getDatePartsFromDate(startPacificWallClock), PACIFIC_TIME_ZONE);
        const end = createDateInTimeZone(getDatePartsFromDate(endPacificWallClock), PACIFIC_TIME_ZONE);

        return {
          start: formatDateTimeForTimeSource(start, timeZone),
          end: formatDateTimeForTimeSource(end, timeZone),
        };
      }

      function formatHourCount(hours) {
        if (!Number.isFinite(hours) || hours < 0) return "TBD";
        if (Math.abs(hours - Math.round(hours)) < 0.000001) return String(Math.round(hours));
        return String(Number(hours.toFixed(2)));
      }

      function buildAnnouncementDuration(hours) {
        const count = formatHourCount(hours);
        return count === "TBD" ? "TBD duration" : `${count} hour`;
      }

      function buildDurationLabel(hours, titleCase = false) {
        const count = formatHourCount(hours);
        if (count === "TBD") return "TBD";

        const numericCount = Number(count);
        const singular = numericCount === 1;
        const unit = singular
          ? titleCase ? "Hour" : "hour"
          : titleCase ? "Hours" : "hours";

        return `${count} ${unit}`;
      }

      function normalizeUrlInput(value, fallback = "") {
        const trimmed = (value || "").trim();
        if (!trimmed) return fallback;

        const markdownMatch = trimmed.match(/\[[^\]]*\]\(([^)]+)\)/);
        let normalized = markdownMatch ? markdownMatch[1].trim() : trimmed;

        if (normalized.startsWith("<") && normalized.endsWith(">")) {
          normalized = normalized.slice(1, -1).trim();
        }

        while (normalized.startsWith("(") && normalized.endsWith(")") && normalized.length > 2) {
          normalized = normalized.slice(1, -1).trim();
        }

        if (normalized.startsWith("(")) {
          normalized = normalized.slice(1).trim();
        }

        if (normalized.endsWith(")")) {
          normalized = normalized.slice(0, -1).trim();
        }

        return normalized || fallback;
      }

      function fallbackCopy(text) {
        try {
          const textArea = document.createElement("textarea");
          textArea.value = text;
          document.body.appendChild(textArea);
          textArea.select();
          const successful = document.execCommand("copy");
          document.body.removeChild(textArea);
          return successful;
        } catch (error) {
          console.error("Fallback copy failed.", error);
          return false;
        }
      }

      async function copyText(text) {
        if (navigator && navigator.clipboard && navigator.clipboard.writeText) {
          try {
            await navigator.clipboard.writeText(text);
            return true;
          } catch (error) {
            console.error("navigator.clipboard failed, falling back.", error);
          }
        }

        return fallbackCopy(text);
      }

      function getOrderedTeams(selectedLetters) {
        return TEAM_OPTIONS.filter((team) => selectedLetters.includes(team.letter));
      }

      function TimestampPanel({

            <div className="summary-grid" style={{ marginTop: "0.9rem" }}>

              <div className="stat">
                <span>Unix Timestamp</span>
                <strong className="mono">{unixSeconds === null ? "Unavailable" : unixSeconds}</strong>
                <small>{date ? `${offsetText} for this date` : "Select a date to generate a timestamp."}</small>
              </div>
            </div>

            <div className="timestamp-list" style={{ marginTop: "0.9rem" }}>
              {TIMESTAMP_FORMATS.map((format) => {
                const token = getDiscordTimestamp(unixSeconds, format.style);
                const preview = getTimestampPreview(date, format.style, nowMs, sourceTimeZone);

                return (
                  <div

                      <div className="timestamp-content">

                      <button

                        onClick={() => onCopy(`${title} ${format.label}`, token)}
                        disabled={!token}
                      >

                      </button>
                    </div>
                  </div>
                );
              })}
            </div>
          </section>
        );

                  <h2 className="card-title">Playtest announcement</h2>
                  <p className="section-copy">
                      Ready to paste into Discord.
                  </p>
                  </div>
                  <button
                    type="button"
                    className="primary-btn"
                    onClick={() => handleCopy("Announcement", announcementText)}
                  >
                    Copy Announcement
                  </button>
                </div>

                <textarea readOnly value={announcementText}></textarea>
              </section>

              <section className="card">
                <div className="card-header">
                  <div>
                    <p className="eyebrow">Event Body</p>
                  <h2 className="card-title">Separate event text</h2>
                  <p className="section-copy">
                      A shorter version with the teams, patch notes, and duration.
                  </p>
                  </div>
                  <div className="button-row">
                    <button
                      type="button"
                      className="primary-btn"
                      onClick={() => handleCopy("Event body", eventBodyText)}
                    >
                      Copy Event Body
                    </button>
                    <button
                      type="button"
                      className="ghost-btn"
                      onClick={() => handleCopy("Announcement and event body", `${announcementText}\n\n${eventBodyText}`)}
                    >
                      Copy Both
                    </button>
                  </div>
                </div>

                <textarea className="compact-output" readOnly value={eventBodyText}></textarea>
              </section>
            </div>
          </main>
        );
      }

      ReactDOM.render(<PlaytestScheduler />, document.getElementById("root"));
    </script>
  </body>
</html>
